# Conda-окружение для проекта MDtoWORD
# Создание: conda env create -f environment.yml
# Активация: conda activate mdtoword

name: mdtoword
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.12
  - pip
  - pip:
    - python-docx==1.1.2
    - PyQt6==6.10.2
    - Pillow==12.0.0
    - markdown-it-py==4.0.0
    - mdit-py-plugins==0.5.0
    - linkify-it-py==2.0.3
