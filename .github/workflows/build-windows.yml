name: Build Windows bundle

on:
  workflow_dispatch:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  build-windows:
    name: Windows x64
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          architecture: "x64"
          cache: pip

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-build.txt

      - name: Validate source
        run: python -m compileall mdtoword

      - name: Build Windows bundle
        shell: pwsh
        run: ./scripts/build_windows.ps1

      - name: Upload Actions artifact
        uses: actions/upload-artifact@v4
        with:
          name: MDtoWORD-Windows-x64
          path: |
            dist/MDtoWORD-Windows-x64.zip
            dist/MDtoWORD-Windows-x64.zip.sha256
          if-no-files-found: error

      - name: Attach bundle to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.ref_name }}" `
            "dist/MDtoWORD-Windows-x64.zip" `
            "dist/MDtoWORD-Windows-x64.zip.sha256" `
            --clobber
